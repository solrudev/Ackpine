name: Classify pull request
description: Classifies a pull request from its changed files

outputs:
  docs:
    description: Whether the pull request contains documentation-related changes, excluding changelog changes
    value: ${{ steps.related.outputs.docs }}
  ci:
    description: Whether the pull request contains CI-related changes
    value: ${{ steps.related.outputs.ci }}
  release:
    description: Whether the pull request changes version.properties
    value: ${{ steps.related.outputs.release }}
  docs_only:
    description: Whether every changed file is documentation-related
    value: ${{ steps.exclusive.outputs.not_docs == 'false' }}
  ci_only:
    description: Whether every changed file is CI-related
    value: ${{ steps.exclusive.outputs.not_ci == 'false' }}

runs:
  using: composite

  steps:
    - name: Classify related changes
      id: related
      uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # 4.0.0
      with:
        token: ${{ github.token }}
        filters: |
          docs:
            - 'docs/**'
            - '!docs/changelog.md'
            - 'README*.md'
            - 'zensical.toml'
          ci:
            - '.github/**'
          release:
            - 'version.properties'

    - name: Classify exclusive changes
      id: exclusive
      uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # 4.0.0
      with:
        token: ${{ github.token }}
        predicate-quantifier: every
        filters: |
          not_docs:
            - '**'
            - '!docs/**'
            - '!README*.md'
            - '!zensical.toml'
          not_ci:
            - '**'
            - '!.github/**'