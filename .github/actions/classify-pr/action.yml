name: Classify pull request
description: Classifies a pull request from its changed files

outputs:
  docs:
    description: Whether the pull request contains documentation-related changes
    value: >-
      ${{ steps.classification.outputs.docs_pages == 'true'
       || steps.classification.outputs.docs_readme == 'true'
       || steps.classification.outputs.docs_zensical == 'true'
       || (steps.classification.outputs.docs_changelog == 'true' && steps.classification.outputs.release == 'false') }}
  ci:
    description: Whether the pull request contains CI-related changes
    value: ${{ steps.classification.outputs.ci }}
  release:
    description: Whether the pull request changes version.json
    value: ${{ steps.classification.outputs.release }}
  other:
    description: Whether the pull request changes something not related to documentation and CI
    value: ${{ steps.classification.outputs.other }}

runs:
  using: composite

  steps:
    - name: Classify changes
      id: classification
      uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # 4.0.0
      with:
        token: ${{ github.token }}
        predicate-quantifier: every
        filters: |
          docs_pages:
            - 'docs/**'
            - '!docs/changelog.md'
          docs_changelog:
            - 'docs/changelog.md'
          docs_readme:
            - 'README*.md'
          docs_zensical:
            - 'zensical.toml'
          ci:
            - '.github/**'
          release:
            - 'version.json'
          other:
            - '**'
            - '!docs/**'
            - '!README*.md'
            - '!zensical.toml'
            - '!.github/**'
            - '!requirements.*'